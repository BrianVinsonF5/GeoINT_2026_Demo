apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: geoint-cis-afm
  namespace: geoint-demo
  annotations:
    kubernetes.io/ingress.class: f5
    cert-manager.io/cluster-issuer: "lab-ca-issuer"
    virtual-server.f5.com/partition: "Common"
    virtual-server.f5.com/balance: "round-robin"
    # BIG-IP AFM policy (L3/L4 firewall policy on the virtual server)
    virtual-server.f5.com/firewall: "/Common/geoint-afm-policy"
spec:
  ingressClassName: f5
  tls:
    - hosts:
        - geoint-afm.f5demos.com
      secretName: geoint-afm-f5demos-com-tls
  rules:
    - host: geoint-afm.f5demos.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: rag-api-service
                port:
                  number: 8000