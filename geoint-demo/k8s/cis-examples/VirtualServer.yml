apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: geoint-ltm-tls
  namespace: geoint-demo
spec:
  secretName: geoint-ltm-f5demos-com-tls
  issuerRef:
    name: lab-ca-issuer
    kind: ClusterIssuer
  commonName: geoint-ltm.f5demos.com
  dnsNames:
    - geoint-ltm.f5demos.com
---
apiVersion: cis.f5.com/v1
kind: TLSProfile
metadata:
  name: geoint-cis-ltm-tls
  namespace: geoint-demo
  labels:
    f5cr: "true"
spec:
  hosts:
    - geoint-ltm.f5demos.com
  tls:
    termination: edge
    clientSSL: /Common/geoint-clientssl
    reference: bigip
---
apiVersion: cis.f5.com/v1
kind: Policy
metadata:
  name: geoint-cis-policy
  namespace: geoint-demo
  labels:
    f5cr: "true"
spec:
  l7Policies:
    waf: /Common/geoint
  profiles:
    logProfiles:
      - /Common/geoint_asm_logging
  l3Policies:
    botDefense: /Common/geoint
---
apiVersion: cis.f5.com/v1
kind: VirtualServer
metadata:
  name: geoint-cis-ltm
  namespace: geoint-demo
  labels:
    f5cr: "true"
spec:
  host: geoint-ltm.f5demos.com
  virtualServerAddress: "10.1.10.110"
  partition: f5-bigip-ctlr
  tlsProfileName: geoint-cis-ltm-tls
  policyName: geoint-cis-policy
  profileAccess: /Common/geointAP
  iRules:
    - /Common/MyApiDiscoveryiRule
    - /Common/rbaciRule
  pools:
    - path: /
      service: frontend-service
      servicePort: 80