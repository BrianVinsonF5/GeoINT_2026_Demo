apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: geoint-cis-afm
  namespace: geoint-demo
  annotations:
    # CIS watches this class and creates BIG-IP LTM objects
    kubernetes.io/ingress.class: f5
    # BIG-IP virtual server address (replace for your lab)
    virtual-server.f5.com/ip: "10.1.10.112"
    virtual-server.f5.com/partition: "Common"
    virtual-server.f5.com/balance: "round-robin"
    # BIG-IP AFM policy (L3/L4 firewall policy on the virtual server)
    virtual-server.f5.com/firewall: "/Common/geoint-afm-policy"
spec:
  ingressClassName: f5
  rules:
    - host: geoint-afm.demo.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: rag-api-service
                port:
                  number: 8000
