apiVersion: batch/v1
kind: Job
metadata:
  name: geoserver-init-job
  namespace: geoint-demo
  labels:
    app: geoserver-init
spec:
  backoffLimit: 4
  template:
    metadata:
      labels:
        app: geoserver-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: geoserver-init
          image: curlimages/curl:8.7.1
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "/scripts/init-geoserver.sh"]
          env:
            - name: GEOSERVER_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: geoserver-secret
                  key: GEOSERVER_ADMIN_USER
            - name: GEOSERVER_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: geoserver-secret
                  key: GEOSERVER_ADMIN_PASSWORD
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgis-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgis-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: geoserver-init-script
              mountPath: /scripts
      volumes:
        - name: geoserver-init-script
          configMap:
            name: geoserver-init
            defaultMode: 0755
