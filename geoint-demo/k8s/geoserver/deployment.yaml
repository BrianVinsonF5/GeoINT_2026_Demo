apiVersion: v1
kind: ConfigMap
metadata:
  name: geoserver-controlflow
  namespace: geoint-demo
  labels:
    app: geoserver
data:
  controlflow.properties: |
    # Global timeout for queued requests (seconds)
    timeout=60

    # Concurrency limits
    ows.global=1000
    ows.wms.getmap=200
    ows.gwc=16
    user=80
    ip=20

    # Per-user rate limits (sliding window)
    user.ows.wms.getmap=200/s
    user.ows.wps.execute=1000/d;30s

    # Special-case formats
    ows.wfs.getfeature.application/msexcel=4
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: geoserver
  namespace: geoint-demo
  labels:
    app: geoserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: geoserver
  template:
    metadata:
      labels:
        app: geoserver
      annotations:
        # Triggers a rolling restart whenever the ConfigMap changes
        checksum/controlflow: "REPLACE_ON_APPLY"
    spec:
      containers:
        - name: geoserver
          image: kartoza/geoserver:2.28.3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: GEOSERVER_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: geoserver-secret
                  key: GEOSERVER_ADMIN_USER
            - name: GEOSERVER_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: geoserver-secret
                  key: GEOSERVER_ADMIN_PASSWORD
            - name: STABLE_EXTENSIONS
              value: "ogcapi-features-plugin,ogcapi-maps-plugin"
            - name: GEOSERVER_CSRF_DISABLED
              value: "true"
            - name: GEOSERVER_CONSOLE_DISABLED
              value: "false"
            - name: PROXY_BASE_URL
              value: "http://geoint-demo.local/geoserver"
          volumeMounts:
            - name: geoserver-data
              mountPath: /opt/geoserver/data_dir
            - name: controlflow-config
              mountPath: /opt/geoserver/data_dir/controlflow.properties
              subPath: controlflow.properties
          readinessProbe:
            httpGet:
              path: /geoserver/ows?service=WMS&version=1.3.0&request=GetCapabilities
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 8
          livenessProbe:
            httpGet:
              path: /geoserver/ows?service=WMS&version=1.3.0&request=GetCapabilities
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
      volumes:
        - name: geoserver-data
          persistentVolumeClaim:
            claimName: geoserver-data-pvc
        - name: controlflow-config
          configMap:
            name: geoserver-controlflow