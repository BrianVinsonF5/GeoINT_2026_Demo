apiVersion: apps/v1
kind: Deployment
metadata:
  name: geoint-frontend
  namespace: geoint-demo
  labels:
    app: geoint-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: geoint-frontend
  template:
    metadata:
      labels:
        app: geoint-frontend
    spec:
      containers:
        - name: frontend
          image: registry.geoint-demo.local/geoint-frontend:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "500m"
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
