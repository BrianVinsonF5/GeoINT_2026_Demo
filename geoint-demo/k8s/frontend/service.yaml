apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: geoint-demo
  labels:
    app: geoint-frontend
spec:
  type: NodePort
  selector:
    app: geoint-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      # nodePort: 30080  # optionally pin to a specific port, otherwise k8s assigns one
