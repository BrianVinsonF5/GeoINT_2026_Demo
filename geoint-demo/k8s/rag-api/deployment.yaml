apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
  namespace: geoint-demo
  labels:
    app: rag-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-api
  template:
    metadata:
      labels:
        app: rag-api
    spec:
      containers:
        - name: rag-api
          image: registry.geoint-demo.local/geoint-rag-api:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: POSTGRES_HOST
              value: postgis-service
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgis-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgis-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgis-secret
                  key: POSTGRES_PASSWORD
            - name: CHROMA_HOST
              value: chromadb-service
            - name: CHROMA_PORT
              value: "8000"
            - name: CHROMA_COLLECTION
              value: geoint_documents
            - name: AWS_REGION
              value: us-east-1
            - name: BEDROCK_MODEL_ID
              value: anthropic.claude-3-haiku-20240307-v1:0
            - name: BEDROCK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bedrock-secret
                  key: BEDROCK_API_KEY
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
