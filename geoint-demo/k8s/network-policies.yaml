apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgis-ingress-restricted
  namespace: geoint-demo
spec:
  podSelector:
    matchLabels:
      app: postgis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: geoserver
        - podSelector:
            matchLabels:
              app: rag-api
      ports:
        - protocol: TCP
          port: 5432
---
