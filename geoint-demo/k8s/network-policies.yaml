apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-egress-restricted
  namespace: geoint-demo
spec:
  podSelector:
    matchLabels:
      app: geoint-frontend
  policyTypes:
    - Egress
  egress:
    # Allow frontend -> GeoServer
    - to:
        - podSelector:
            matchLabels:
              app: geoserver
      ports:
        - protocol: TCP
          port: 8080
    # Allow frontend -> RAG API
    - to:
        - podSelector:
            matchLabels:
              app: rag-api
      ports:
        - protocol: TCP
          port: 8000
    # Allow DNS lookups for service discovery.
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
