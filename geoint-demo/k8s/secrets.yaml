apiVersion: v1
kind: Secret
metadata:
  name: postgis-secret
  namespace: geoint-demo
  labels:
    app: postgis
type: Opaque
stringData:
  # Demo credentials only. Replace for production.
  POSTGRES_USER: geoint_user
  POSTGRES_PASSWORD: GeointPass!2026
  POSTGRES_DB: geoint_db
---
apiVersion: v1
kind: Secret
metadata:
  name: geoserver-secret
  namespace: geoint-demo
  labels:
    app: geoserver
type: Opaque
stringData:
  # Demo credentials only. Replace for production.
  GEOSERVER_ADMIN_USER: admin
  GEOSERVER_ADMIN_PASSWORD: GeoServerPass!2026
---
apiVersion: v1
kind: Secret
metadata:
  name: gemini-secret
  namespace: geoint-demo
  labels:
    app: rag-api
type: Opaque
stringData:
  # Replace with a valid Google AI API key (Gemini access).
  GEMINI_API_KEY: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: calypsoai-secret
  namespace: geoint-demo
  labels:
    app: rag-api
type: Opaque
stringData:
  # Replace with valid Calypso/F5 AI Gateway Guardrails credentials.
  CALYPSOAI_URL: "https://www.us1.calypsoai.app"
  CALYPSOAI_TOKEN: ""
  CALYPSOAI_PROJECT_ID: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-pull-secret
  namespace: geoint-demo
  labels:
    app: geoint-demo
type: kubernetes.io/dockerconfigjson
stringData:
  # Replace GITHUB_USERNAME and GITHUB_PAT with a GitHub user/token that has
  # read:packages access to pull private images from ghcr.io.
  # If your images are public, this secret can remain as placeholders.
  .dockerconfigjson: |
    {
      "auths": {
        "ghcr.io": {
          "username": "GITHUB_USERNAME",
          "password": "GITHUB_PAT"
        }
      }
    }
