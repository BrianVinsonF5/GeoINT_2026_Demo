apiVersion: v1
kind: Secret
metadata:
  name: postgis-secret
  namespace: geoint-demo
  labels:
    app: postgis
type: Opaque
stringData:
  # Demo credentials only. Replace for production.
  POSTGRES_USER: geoint_user
  POSTGRES_PASSWORD: GeointPass!2026
  POSTGRES_DB: geoint_db
---
apiVersion: v1
kind: Secret
metadata:
  name: geoserver-secret
  namespace: geoint-demo
  labels:
    app: geoserver
type: Opaque
stringData:
  # Demo credentials only. Replace for production.
  GEOSERVER_ADMIN_USER: admin
  GEOSERVER_ADMIN_PASSWORD: GeoServerPass!2026
---
apiVersion: v1
kind: Secret
metadata:
  name: bedrock-secret
  namespace: geoint-demo
  labels:
    app: rag-api
type: Opaque
stringData:
  # Replace with valid AWS credentials.
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_SESSION_TOKEN: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: internal-registry-tls
  namespace: geoint-demo
  labels:
    app: internal-registry
type: kubernetes.io/tls
stringData:
  # Replace with a valid cert/key pair for registry.geoint-demo.local.
  # Example generation:
  # openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
  #   -keyout tls.key -out tls.crt -subj "/CN=registry.geoint-demo.local"
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    REPLACE_WITH_REGISTRY_CERT
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_REGISTRY_KEY
    -----END PRIVATE KEY-----
