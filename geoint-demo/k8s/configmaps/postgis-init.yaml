apiVersion: v1
kind: ConfigMap
metadata:
  name: postgis-init
  namespace: geoint-demo
  labels:
    app: postgis
data:
  01-init-geoint.sql: |
    -- GEOINT demo initialization script
    -- Creates database, extensions, schema, tables, and sample UNCLASSIFIED data.

    CREATE EXTENSION IF NOT EXISTS postgis;
    CREATE EXTENSION IF NOT EXISTS postgis_topology;

    CREATE SCHEMA IF NOT EXISTS geoint_data;

    CREATE TABLE IF NOT EXISTS geoint_data.military_installations (
      id SERIAL PRIMARY KEY,
      name TEXT NOT NULL,
      type TEXT NOT NULL,
      classification TEXT NOT NULL,
      country TEXT NOT NULL,
      geometry GEOMETRY(POINT, 4326) NOT NULL
    );

    CREATE TABLE IF NOT EXISTS geoint_data.satellite_imagery_catalog (
      id SERIAL PRIMARY KEY,
      sensor_name TEXT NOT NULL,
      acquisition_date DATE NOT NULL,
      cloud_cover NUMERIC(5,2) NOT NULL,
      resolution_meters NUMERIC(6,2) NOT NULL,
      footprint GEOMETRY(POLYGON, 4326) NOT NULL,
      classification TEXT NOT NULL
    );

    CREATE TABLE IF NOT EXISTS geoint_data.geoint_reports (
      id SERIAL PRIMARY KEY,
      title TEXT NOT NULL,
      summary TEXT NOT NULL,
      report_date DATE NOT NULL,
      area_of_interest GEOMETRY(POLYGON, 4326) NOT NULL,
      classification TEXT NOT NULL
    );

