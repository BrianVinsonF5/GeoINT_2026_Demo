apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: geoint-demo
  labels:
    app: geoint-frontend
data:
  nginx.conf: |
    server {
      listen 80;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      # Gzip for demo performance and reduced payload size.
      gzip on;
      gzip_types text/plain text/css application/json application/javascript application/xml+rss application/xml image/svg+xml;
      gzip_min_length 1024;

      # Security/CORS headers for browser interoperability.
      add_header X-Content-Type-Options nosniff always;
      add_header X-Frame-Options SAMEORIGIN always;
      add_header Referrer-Policy no-referrer-when-downgrade always;
      add_header Access-Control-Allow-Origin "*" always;
      add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

      # F5 integration point:
      # /geoserver path is where WAF/DoS policies can be demonstrated.
      location /geoserver/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://geoserver-service.geoint-demo.svc.cluster.local:8080/geoserver/;
      }

      # F5 integration point:
      # /api path is where API Security + AI Gateway guardrails are enforced.
      location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_pass http://rag-api-service.geoint-demo.svc.cluster.local:8000/api/;
      }

      location / {
        try_files $uri $uri/ /index.html;
      }

      if ($request_method = OPTIONS) {
        return 204;
      }
    }
