<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GEOINT Analysis Platform</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@9.2.4/ol.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="f5-logo">F5</div>
        <h1>GEOINT Analysis Platform</h1>
      </div>
      <div class="status-pills">
        <span class="pill">WAF: Enabled</span>
        <span class="pill">API Security: Enabled</span>
        <button id="guardrails-toggle" class="pill status-toggle enabled" type="button">AI Gateway: Guardrails Enabled</button>
      </div>
    </header>

    <main class="content-grid">
      <aside class="left-panel">
        <h2>Layer Control</h2>
        <label><input type="checkbox" id="layer-installations" checked /> Military Installations</label>
        <label><input type="checkbox" id="layer-imagery" checked /> Satellite Imagery Catalog</label>
        <label><input type="checkbox" id="layer-reports" checked /> GEOINT Reports</label>

        <div class="legend">
          <h3>Legend</h3>
          <div><span class="legend-dot red"></span> Installations (Point)</div>
          <div><span class="legend-dot blue"></span> Imagery Footprints (Polygon)</div>
          <div><span class="legend-dot amber"></span> Reports AOI (Polygon)</div>
        </div>
      </aside>

      <section class="map-panel">
        <div id="map" class="map"></div>
        <div id="popup" class="ol-popup">
          <a href="#" id="popup-closer" class="ol-popup-closer"></a>
          <div id="popup-content"></div>
        </div>
      </section>
    </main>

    <section class="chat-panel">
      <div class="chat-header">AI Assistant</div>
      <div id="chat-messages" class="chat-messages"></div>
      <div class="chips">
        <button class="chip">Show all satellite imagery with &lt;30% cloud cover</button>
        <button class="chip">What military installations are in Europe?</button>
        <button class="chip">Summarize recent GEOINT reports for the Middle East</button>
      </div>
      <div class="chat-input-row">
        <input id="chat-input" type="text" placeholder="Ask GEOINT assistant..." />
        <button id="chat-send">Ask</button>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ol@9.2.4/dist/ol.js"></script>
  <script src="./app.js"></script>
</body>
</html>
